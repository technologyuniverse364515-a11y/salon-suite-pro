<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Salon Suite Pro</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string into a single query parameter,
      // and then redirects the browser to the new url with only a query parameter and hash fragment,
      // e.g. http://www.foo.tld/one/two?a=b&c=d#qwe, becomes http://www.foo.tld/?p=/one/two&q=a=b~and~c=d#qwe
      // Note: this script should run as early as possible in the 404.html file.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
